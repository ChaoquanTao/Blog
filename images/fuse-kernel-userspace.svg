<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 680" font-family="'PingFang SC','Microsoft YaHei','Helvetica Neue',Arial,sans-serif">
  <defs>
    <linearGradient id="kernelBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="userBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8f4f8"/>
      <stop offset="100%" stop-color="#d4ecf7"/>
    </linearGradient>
    <filter id="shadow" x="-3%" y="-3%" width="106%" height="106%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-opacity="0.15"/>
    </filter>
    <marker id="arrowOrange" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ff9800"/>
    </marker>
  </defs>

  <!-- 用户空间 (上层) -->
  <rect x="30" y="20" width="840" height="250" rx="14" fill="url(#userBg)" stroke="#90caf9" stroke-width="2"/>
  <text x="60" y="58" font-size="24" font-weight="bold" fill="#1565c0">用户空间 (Ring 3)</text>
  <text x="60" y="88" font-size="17" fill="#546e7a">普通应用程序 · 崩了也不影响大局</text>

  <!-- 用户态应用 -->
  <rect x="60" y="115" width="175" height="120" rx="10" fill="#ffffff" stroke="#90caf9" stroke-width="2" filter="url(#shadow)"/>
  <text x="148" y="166" text-anchor="middle" font-size="20" font-weight="bold" fill="#1565c0">浏览器</text>
  <text x="148" y="196" text-anchor="middle" font-size="16" fill="#78909c">崩了就崩了</text>

  <rect x="265" y="115" width="175" height="120" rx="10" fill="#ffffff" stroke="#90caf9" stroke-width="2" filter="url(#shadow)"/>
  <text x="353" y="166" text-anchor="middle" font-size="20" font-weight="bold" fill="#1565c0">你的脚本</text>
  <text x="353" y="196" text-anchor="middle" font-size="16" fill="#78909c">崩了就崩了</text>

  <rect x="470" y="115" width="175" height="120" rx="10" fill="#ffffff" stroke="#90caf9" stroke-width="2" filter="url(#shadow)"/>
  <text x="558" y="166" text-anchor="middle" font-size="20" font-weight="bold" fill="#1565c0">数据库</text>
  <text x="558" y="196" text-anchor="middle" font-size="16" fill="#78909c">崩了就崩了</text>

  <rect x="675" y="115" width="175" height="120" rx="10" fill="#e3f2fd" stroke="#42a5f5" stroke-width="2.5" filter="url(#shadow)"/>
  <text x="763" y="158" text-anchor="middle" font-size="19" font-weight="bold" fill="#1565c0">FUSE daemon</text>
  <text x="763" y="184" text-anchor="middle" font-size="15" fill="#1976d2">文件系统的"真逻辑"</text>
  <text x="763" y="210" text-anchor="middle" font-size="14" fill="#78909c">崩了也只是这一个进程</text>

  <!-- 护城河 / 分界线 -->
  <rect x="30" y="285" width="840" height="65" rx="0" fill="#fff3e0"/>
  <line x1="30" y1="285" x2="870" y2="285" stroke="#ff9800" stroke-width="3" stroke-dasharray="10,5"/>
  <line x1="30" y1="350" x2="870" y2="350" stroke="#ff9800" stroke-width="3" stroke-dasharray="10,5"/>
  <text x="450" y="325" text-anchor="middle" font-size="20" font-weight="bold" fill="#e65100">护城河：CPU 硬件强制隔离（系统调用 = 唯一正门）</text>

  <!-- 内核空间 (下层) -->
  <rect x="30" y="365" width="840" height="290" rx="14" fill="url(#kernelBg)" stroke="#5c6bc0" stroke-width="2"/>
  <text x="60" y="403" font-size="24" font-weight="bold" fill="#e8eaf6">内核空间 (Ring 0)</text>
  <text x="60" y="433" font-size="17" fill="#9fa8da">权力无限 · 一崩全崩 · 必须绝对可靠</text>

  <!-- 内核组件 -->
  <rect x="60" y="460" width="195" height="100" rx="10" fill="#283593" stroke="#5c6bc0" stroke-width="2"/>
  <text x="158" y="502" text-anchor="middle" font-size="20" font-weight="bold" fill="#e8eaf6">VFS</text>
  <text x="158" y="530" text-anchor="middle" font-size="16" fill="#9fa8da">虚拟文件系统层</text>

  <rect x="280" y="460" width="195" height="100" rx="10" fill="#283593" stroke="#5c6bc0" stroke-width="2"/>
  <text x="378" y="502" text-anchor="middle" font-size="20" font-weight="bold" fill="#e8eaf6">ext4 / NTFS</text>
  <text x="378" y="530" text-anchor="middle" font-size="16" fill="#9fa8da">传统文件系统</text>

  <rect x="500" y="460" width="210" height="100" rx="10" fill="#1b5e20" stroke="#66bb6a" stroke-width="2.5"/>
  <text x="605" y="498" text-anchor="middle" font-size="19" font-weight="bold" fill="#c8e6c9">FUSE 内核模块</text>
  <text x="605" y="524" text-anchor="middle" font-size="16" fill="#a5d6a7">"空壳"转发员</text>
  <text x="605" y="548" text-anchor="middle" font-size="14" fill="#81c784">零业务逻辑</text>

  <rect x="735" y="460" width="120" height="100" rx="10" fill="#283593" stroke="#5c6bc0" stroke-width="2"/>
  <text x="795" y="502" text-anchor="middle" font-size="20" font-weight="bold" fill="#e8eaf6">驱动</text>
  <text x="795" y="530" text-anchor="middle" font-size="16" fill="#9fa8da">硬件驱动</text>

  <!-- FUSE 连接线 -->
  <path d="M 763 235 L 763 285" stroke="#ff9800" stroke-width="2.5" fill="none" marker-end="url(#arrowOrange)"/>
  <path d="M 605 460 L 605 350" stroke="#66bb6a" stroke-width="2.5" fill="none" stroke-dasharray="6,4"/>
  <text x="685" y="315" text-anchor="middle" font-size="16" font-weight="bold" fill="#e65100">/dev/fuse</text>
</svg>
